name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: go mod download

      # Build validation (cross-platform).
      # Conditionally diffs go.sum only if present — pure-stdlib children have none.
      - name: Build validation
        shell: bash
        run: |
          go build ./...
          go mod tidy
          git diff --exit-code go.mod
          if [ -f go.sum ]; then
            git diff --exit-code go.sum
          fi

      # Go's race detector supports Windows/amd64, so -race runs everywhere.
      # shell: bash keeps quoting consistent across Ubuntu/macOS/Windows runners.
      - name: Run tests
        shell: bash
        run: go test -v -race -coverprofile=coverage.out ./...

      # Benchmarks are not run in CI. Without a baseline + benchstat comparison
      # they produce cost without signal. Run locally on-demand via
      # `go test -bench=. -benchmem ./...` when investigating performance.
